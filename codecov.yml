codecov:
  notify:
    after_n_builds: 3
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: true
  show_carryforward_flags: true

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        informational: true
      - type: patch
        informational: true
  individual_flags:
    - name: pythinker-code
      paths:
        - src/pythinker_code/
      after_n_builds: 3
    - name: pythinker-core
      paths:
        - packages/pythinker-core/src/pythinker_core/
      after_n_builds: 3
    - name: pythinker-host
      paths:
        - packages/pythinker-host/src/pythinker_host/
      after_n_builds: 3
    - name: pythinker-sdk
      paths:
        - sdks/pythinker-sdk/src/pythinker_sdk/
      after_n_builds: 3

ignore:
  - "**/tests/**"
  - "**/tests_e2e/**"
  - "**/tests_ai/**"
  - "**/conftest.py"
  - "**/__init__.py"
  - "src/pythinker_code/deps/**"
  - "examples/**"
